<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Operation: Fel Bebis 👶</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #1a1a2e;
      --surface2: #252540;
      --accent: #ff9f43;
      --green: #00c896;
      --red: #e84393;
      --blue: #74b9ff;
      --purple: #a29bfe;
      --text: #e8e8f0;
      --text-dim: #7f8c8d;
      --border: #2c2c4a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 48px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 16px;
      color: var(--text-dim);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .header {
      display: flex;
      align-items: center;
      padding: 12px 0 20px;
      font-weight: 700;
      font-size: 17px;
    }
    .phase-badge {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 16px 0 8px;
    }
    .sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* Clue cards */
    .clue-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      animation: slideIn 0.35s ease;
    }
    .clue-card.phase-1 { border-left: 3px solid var(--blue); }
    .clue-card.phase-2 { border-left: 3px solid var(--purple); }
    .clue-card.phase-3 { border-left: 3px solid var(--green); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .clue-label   { font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
    .clue-content { font-size: 14px; line-height: 1.65; white-space: pre-line; }
    .clue-from    { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
    .empty-clues  { text-align: center; color: var(--text-dim); font-size: 14px; padding: 20px; font-style: italic; }

    /* Buttons */
    .btn {
      display: block; width: 100%;
      padding: 14px; border: none;
      border-radius: var(--radius);
      font-size: 16px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-primary:active { transform: scale(0.98); filter: brightness(0.9); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sent      { background: var(--surface); color: var(--green); border: 1px solid var(--green); cursor: default; }

    .btn-choice {
      display: block; width: 100%;
      background: var(--surface2); color: var(--text);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px; font-size: 15px;
      cursor: pointer; text-align: left;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .btn-choice:hover    { border-color: var(--accent); }
    .btn-choice.selected { border-color: var(--accent); background: rgba(255,159,67,0.1); }

    /* Inputs */
    .puzzle-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px; color: var(--text);
      font-size: 16px; margin-bottom: 12px;
    }
    .puzzle-input:focus { outline: none; border-color: var(--accent); }
    .puzzle-label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }

    .counter-row {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 10px;
    }
    .counter-row label { flex: 1; font-size: 14px; }
    .counter-btn {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2); color: var(--text);
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .counter-val { width: 32px; text-align: center; font-size: 20px; font-weight: 700; }

    /* Feedback */
    .feedback {
      border-radius: 8px; padding: 12px;
      margin-top: 8px; font-size: 14px;
      text-align: center; display: none;
    }
    .feedback.success { display: block; background: rgba(0,200,150,0.12); border: 1px solid var(--green); color: var(--green); }
    .feedback.error   { display: block; background: rgba(232,67,147,0.12); border: 1px solid var(--red);   color: var(--red); }

    /* Timer */
    .timer {
      text-align: center;
      font-size: 52px; font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      padding: 8px; margin-bottom: 8px;
    }
    .timer.ok      { color: var(--green); }
    .timer.warning { color: var(--accent); }
    .timer.urgent  { color: var(--red); animation: pulse 0.6s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Role select */
    .role-grid { display: grid; gap: 12px; padding-top: 8px; }
    .role-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .role-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .role-emoji { font-size: 28px; }
    .role-name  { font-size: 17px; font-weight: 700; margin: 6px 0 3px; }
    .role-desc  { font-size: 13px; color: var(--text-dim); }

    /* Team clue */
    .team-clue {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px;
      transition: opacity 0.3s;
    }
    .team-clue.sent { opacity: 0.55; }
    .team-clue .clue-label   { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .team-clue .clue-preview { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; white-space: pre-line; }

    .waiting { text-align: center; color: var(--text-dim); font-size: 14px; padding: 16px; }

    /* Admin */
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .admin-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 12px;
      color: var(--text); font-size: 14px; cursor: pointer;
    }

    /* Victory */
    .victory { text-align: center; padding: 48px 16px; }
    .victory .big { font-size: 64px; margin-bottom: 16px; }
    .victory h1 { font-size: 28px; color: var(--accent); margin-bottom: 12px; }
    .victory p  { font-size: 15px; line-height: 1.7; color: var(--text-dim); }

    /* Setup */
    .setup-box {
      background: rgba(255,159,67,0.08);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px; font-size: 14px; line-height: 1.7; margin-top: 16px;
    }
    .setup-box code { background: var(--surface2); padding: 2px 5px; border-radius: 4px; font-size: 12px; }

    .alert-banner {
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; font-size: 14px;
    }
    .alert-red { background: rgba(232,67,147,0.1); border: 1px solid var(--red); }
  </style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div></div>

<script type="module">

};
// ============================================================

const NEEDS_SETUP = FIREBASE_CONFIG.apiKey === 'DIN_API_KEY';
let db = null;
if (!NEEDS_SETUP) db = getDatabase(initializeApp(FIREBASE_CONFIG));

// ============================================================
// SPELDATA
// ============================================================
const TEAM_INFO = {
  team1: { name: 'Blöjpatrullen',   emoji: '🍼' },
  team2: { name: 'Nappkommissionen', emoji: '🧸' },
  team3: { name: 'Vällingmaffian',  emoji: '🥣' },
};

const CLUES = {
  1: {
    team1: {
      id: 'p1t1',
      label: '📱 SMS från Louise (igår kväll)',
      content: '"Hittade inte nyckeln i hallen btw, lade den på rätt ställe efteråt. Kram! ❤️"',
    },
    team2: {
      id: 'p1t2',
      label: '📸 Foto – Köket (David skickade igår)',
      content: 'Bild på krokarna vid kylskåpet. Alla är tomma.\nBildtext: "Var är nyckeln nu igen?? 😅"',
    },
    team3: {
      id: 'p1t3',
      label: '🗒️ Post-it på kylskåpet',
      content: '"Davids REGEL #1:\nNyckeln hänger ALLTID på kroken vid badrumsspegeln.\nALLTID. Inga undantag. /L 😘"',
    },
  },
  2: {
    team1: {
      id: 'p2t1',
      label: '📋 Personalschema (kväll)',
      content: 'Jourhavande barnmorska 18:00–06:00:\n\nDr. L. Lindqvist\nAvdelning: BB-2',
    },
    team2: {
      id: 'p2t2',

      content: 'Rum BB-101: BELAGT (Svensson)\nRum BB-102: LEDIGT — reserverat Karlsson ✓\nRum BB-103: BELAGT (Eriksson)',
    },
    team3: {
      id: 'p2t3',
      label: '⚗️ Lustgas-instruktion (standard)',
      content: 'FÖRLOSSNINGSGAS STANDARDMIX:\n• Kvävgas (N₂O): 1 del\n• Syrgas (O₂): 2 delar\nTotalt: 3 delar',
    },
  },
  3: {
    team1: {
      id: 'p3t1',
      label: '👶 Observation – Förlossningssalen',
      content: 'Vagn A: Blå mössa 🔵, verkar lugn, sover\nVagn B: Rosa mössa 🩷, skriker, arg',
    },
    team2: {
      id: 'p3t2',
      label: '📋 Patientjournal – Louise Karlsson',
      content: 'Förväntat vikt: 3,2 kg\nKön: Pojke 👦\nID-nummer slutar på: ...7',
    },
    team3: {
      id: 'p3t3',
      label: '⚖️ Vågresultat + ID-armband',
      content: 'Vagn A: 3,2 kg | Armband-ID: #1047\nVagn B: 3,8 kg | Armband-ID: #1038',
    },
  },
};

const PHASE3_SECS = 3 * 60;

// ============================================================
// STATE
// ============================================================
const role = new URLSearchParams(location.search).get('role');

let gamePhase     = 1;
let sentClues     = {};
let davidClues    = {};
let phase3Start   = null;
let timerInterval = null;
let selectedRoom  = null;
let selectedBaby  = null;
const gas = { nitrous: 1, oxygen: 2 };

// ============================================================
// FIREBASE HELPERS
// ============================================================
async function ensureGame() {
  const snap = await get(ref(db, 'game/phase'));
  if (!snap.exists()) await set(ref(db, 'game/phase'), 1);
}

async function sendClueToFirebase(phase, teamRole, clue) {
  await update(ref(db), {
    [`game/clues/${clue.id}`]: true,
    [`game/davidClues/${clue.id}`]: {
      label: clue.label, content: clue.content,
      phase, team: teamRole, timestamp: Date.now(),
    },
  });
}

async function advancePhase(next) {
  const updates = { 'game/phase': next };
  if (next === 3) updates['game/phase3Start'] = Date.now();
  await update(ref(db), updates);
}

async function resetGame() {
  await set(ref(db, 'game'), { phase: 1 });
}

// ============================================================
// RENDER
// ============================================================
const appEl = document.getElementById('app');

function render() {
  if (NEEDS_SETUP)                                                       { renderSetup();      return; }
  if (!role || !['david','team1','team2','team3','admin'].includes(role)) { renderRoleSelect(); return; }
  if (gamePhase === 'victory')                                            { renderVictory();    return; }
  if (role === 'david')  { renderDavid(); return; }
  if (role === 'admin')  { renderAdmin(); return; }
  renderTeam(role);
}

// --- Setup ---
function renderSetup() {
  appEl.innerHTML = `
    <div style="padding-top:32px;">
      <h1 style="font-size:22px;color:var(--accent);">⚙️ Firebase ej konfigurerat</h1>
      <div class="setup-box">
        <p>Öppna <code>index.html</code> och byt ut <code>FIREBASE_CONFIG</code> mot din riktiga konfiguration.</p>
        <p style="margin-top:8px;">Instruktioner finns i kommentarerna i koden (sök på "BYTA UT").</p>
      </div>
    </div>`;
}

// --- Role select ---
function renderRoleSelect() {
  appEl.innerHTML = `
    <div style="padding-top:24px;text-align:center;">
      <div style="font-size:40px;">👶</div>
      <h1 style="font-size:22px;color:var(--accent);margin:10px 0 4px;">Operation: Fel Bebis</h1>
      <p style="font-size:14px;color:var(--text-dim);margin-bottom:24px;">Välj din roll för att börja</p>
    </div>
    <div class="role-grid">
      <div class="role-btn" onclick="gotoRole('david')">
        <div class="role-emoji">🎯</div>
        <div class="role-name">David</div>
        <div class="role-desc">Lös mysteriet med lagets ledtrådar</div>
      </div>
      <div class="role-btn" onclick="gotoRole('team1')">
        <div class="role-emoji">🍼</div><div class="role-name">Blöjpatrullen</div>
        <div class="role-desc">Skicka ledtrådar till David</div>
      </div>
      <div class="role-btn" onclick="gotoRole('team2')">
        <div class="role-emoji">🧸</div><div class="role-name">Nappkommissionen</div>
        <div class="role-desc">Skicka ledtrådar till David</div>
      </div>
      <div class="role-btn" onclick="gotoRole('team3')">
        <div class="role-emoji">🥣</div><div class="role-name">Vällingmaffian</div>
        <div class="role-desc">Skicka ledtrådar till David</div>
      </div>
      <div class="role-btn" onclick="gotoRole('admin')" style="opacity:0.55;grid-column:1/-1;">
        <div class="role-emoji">🔧</div><div class="role-name">Admin (Johan)</div>
        <div class="role-desc">Hantera spelet</div>
      </div>
    </div>`;
}
window.gotoRole = function(r) {
  const u = new URL(location.href);
  u.searchParams.set('role', r);
  location.href = u.toString();
};

// --- David ---
function renderDavid() {
  const phase = gamePhase;
  const story = {
    1: 'Louise har fått värkar — det är dags! Ni måste till sjukhuset NU. Men var är bilnyckeln? <strong>Lagen har information som hjälper dig lista ut det med uteslutningsmetoden.</strong>',
    2: 'Ni är på sjukhuset — men det är total kaos! Ni behöver lösa tre saker:<br>1. Hitta <strong>rätt barnmorska</strong><br>2. Boka <strong>rätt rum</strong><br>3. Blanda <strong>rätt lustgas</strong>',
    3: '⚠️ <strong>KRIS!</strong> Ni fick tillbaka <em>fel bebis</em> från undersökningen! Lista ut vilken bebis som är er — <strong>innan Louise märker!</strong>',
  };

  appEl.innerHTML = `
    <div class="header">🎯 David<span class="phase-badge">Fas ${phase}/3</span></div>
    ${phase === 3 ? '<div id="timer-box"></div>' : ''}
    <div class="card">
      <h2>📖 Din situation</h2>
      <p style="font-size:15px;line-height:1.7;">${story[phase]}</p>
    </div>
    <div class="section-label">📬 Ledtrådar från lagen</div>
    <div id="david-clues"></div>
    <hr class="sep">
    <div class="section-label">🔐 Lös pusslet</div>
    ${buildPuzzleHtml(phase)}`;

  refreshDavidClues();
  if (phase === 3) startTimer();
}

function refreshDavidClues() {
  const el = document.getElementById('david-clues');
  if (!el) return;
  const current = Object.values(davidClues)
    .filter(c => c.phase == gamePhase)
    .sort((a, b) => a.timestamp - b.timestamp);
  if (current.length === 0) {
    el.innerHTML = '<div class="empty-clues">Väntar på ledtrådar från lagen… ⏳</div>';
  } else {
    el.innerHTML = current.map(c => `
      <div class="clue-card phase-${c.phase}">
        <div class="clue-label">${c.label}</div>
        <div class="clue-content">${c.content}</div>
        <div class="clue-from">${TEAM_INFO[c.team]?.emoji || ''} ${TEAM_INFO[c.team]?.name || c.team}</div>
      </div>`).join('');
  }
}

function buildPuzzleHtml(phase) {
  if (phase === 1) return `
    <p style="font-size:14px;color:var(--text-dim);margin-bottom:12px;">Var hänger bilnyckeln?</p>
    ${['🚪 Hallen','🍳 Köket','🛋️ Vardagsrummet','🪥 Badrummet'].map(r => {
      const val = r.split(' ')[1];
      return `<button class="btn-choice" id="choice-${val}" onclick="pickRoom('${val}')">${r}</button>`;
    }).join('')}
    <div class="feedback" id="p1-fb"></div>
    <button class="btn btn-primary" style="margin-top:8px;" onclick="checkP1()">Lås upp 🔑</button>`;

  if (phase === 2) return `
    <div class="card">
      <h2>1. Barnmorskans efternamn</h2>
      <div class="puzzle-label">Skriv efternamnet:</div>
      <input class="puzzle-input" id="p2-doctor" placeholder="t.ex. Svensson" autocomplete="off">
    </div>
    <div class="card">
      <h2>2. Rumsnummer</h2>
      <div class="puzzle-label">Skriv rumsnumret:</div>
      <input class="puzzle-input" id="p2-room" placeholder="t.ex. 102" type="text" autocomplete="off">
    </div>
    <div class="card">
      <h2>3. Lustgasblandning</h2>
      <div class="counter-row">
        <label>Kvävgas (delar):</label>
        <button class="counter-btn" onclick="adjGas('nitrous',-1)">−</button>
        <span class="counter-val" id="nitrous-val">${gas.nitrous}</span>
        <button class="counter-btn" onclick="adjGas('nitrous',1)">+</button>
      </div>
      <div class="counter-row">
        <label>Syrgas (delar):</label>
        <button class="counter-btn" onclick="adjGas('oxygen',-1)">−</button>
        <span class="counter-val" id="oxygen-val">${gas.oxygen}</span>
        <button class="counter-btn" onclick="adjGas('oxygen',1)">+</button>
      </div>
    </div>
    <div class="feedback" id="p2-fb"></div>
    <button class="btn btn-primary" onclick="checkP2()">Bekräfta allt ✓</button>`;

  if (phase === 3) return `
    <p style="font-size:14px;color:var(--text-dim);margin-bottom:12px;">Välj rätt bebis:</p>
    <button class="btn-choice" id="baby-A" onclick="pickBaby('A')">👶 Vagn A — Blå mössa 🔵</button>
    <button class="btn-choice" id="baby-B" onclick="pickBaby('B')">👶 Vagn B — Rosa mössa 🩷</button>
    <div class="feedback" id="p3-fb"></div>
    <button class="btn btn-primary" style="margin-top:8px;" onclick="checkP3()">Det är den här bebisen! 👶</button>`;

  return '';
}

// Puzzle interaction
window.pickRoom = function(val) {
  selectedRoom = val;
  document.querySelectorAll('[id^="choice-"]').forEach(b => b.classList.remove('selected'));
  document.getElementById(`choice-${val}`)?.classList.add('selected');
};
window.pickBaby = function(val) {
  selectedBaby = val;
  document.querySelectorAll('[id^="baby-"]').forEach(b => b.classList.remove('selected'));
  document.getElementById(`baby-${val}`)?.classList.add('selected');
};
window.adjGas = function(field, delta) {
  gas[field] = Math.max(0, Math.min(9, gas[field] + delta));
  document.getElementById(`${field}-val`).textContent = gas[field];
};

window.checkP1 = async function() {
  const fb = document.getElementById('p1-fb');
  if (!selectedRoom) { showFb(fb,'error','Välj ett rum!'); return; }
  if (selectedRoom === 'Badrummet') {
    showFb(fb,'success','✓ Rätt! Nyckeln hänger vid badrumsspegeln!');
    setTimeout(() => advancePhase(2), 1400);
  } else {
    showFb(fb,'error',`✗ Nyckeln finns inte i ${selectedRoom}. Tänk igen…`);
  }
};
window.checkP2 = async function() {
  const fb     = document.getElementById('p2-fb');
  const doctor = (document.getElementById('p2-doctor')?.value||'').trim().toLowerCase();
  const room   = (document.getElementById('p2-room')?.value||'').trim().replace(/bb-?/i,'');
  const ok = [
    doctor.includes('lindqvist'),
    room === '102',
    gas.nitrous === 1 && gas.oxygen === 2,
  ];
  if (ok.every(Boolean)) {
    showFb(fb,'success','✓ Perfekt! Rätt doktor, rätt rum, rätt gas. Ni är inne!');
    setTimeout(() => advancePhase(3), 1400);
  } else {
    const bad = ['doktorns namn','rumsnummer','gasblandning'].filter((_,i)=>!ok[i]);
    showFb(fb,'error',`✗ Stämmer inte: ${bad.join(', ')}`);
  }
};
window.checkP3 = async function() {
  const fb = document.getElementById('p3-fb');
  if (!selectedBaby) { showFb(fb,'error','Välj en vagn!'); return; }
  if (selectedBaby === 'A') {
    showFb(fb,'success','✓ Det är er bebis! Vagn A — blå mössa, 3,2 kg, ID #1047! 👶');
    stopTimer();
    setTimeout(() => advancePhase('victory'), 1400);
  } else {
    showFb(fb,'error','✗ Det är fel bebis! Louise märker snart…');
  }
};

function showFb(el, type, msg) {
  el.className = `feedback ${type}`;
  el.textContent = msg;
}

// Timer
function startTimer() {
  stopTimer();
  tickTimer();
  timerInterval = setInterval(tickTimer, 1000);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
function tickTimer() {
  const box = document.getElementById('timer-box');
  if (!box || !phase3Start) return;
  const remaining = Math.max(0, PHASE3_SECS - Math.floor((Date.now() - phase3Start) / 1000));
  const m   = String(Math.floor(remaining/60)).padStart(2,'0');
  const s   = String(remaining%60).padStart(2,'0');
  const cls = remaining < 30 ? 'urgent' : remaining < 90 ? 'warning' : 'ok';
  box.innerHTML = `<div class="timer ${cls}">${m}:${s}</div>`;
}

// --- Team ---
function renderTeam(teamRole) {
  const phase  = gamePhase;
  const info   = TEAM_INFO[teamRole];
  const clue   = CLUES[phase]?.[teamRole];
  const isSent = clue ? !!sentClues[clue.id] : false;
  const waitMsg = {
    1: 'Väntar på att David hittar nyckeln…',
    2: 'Väntar på att David löser sjukhuspusslen…',
    3: 'Väntar på att David räddar rätt bebis…',
  };

  appEl.innerHTML = `
    <div class="header">${info.emoji} ${info.name}<span class="phase-badge">Fas ${phase}/3</span></div>
    ${phase === 3 ? '<div class="alert-banner alert-red">⚠️ David måste rädda bebisen NU!</div>' : ''}
    <div class="section-label">💡 Er ledtråd (fas ${phase})</div>
    ${clue ? `
      <div class="team-clue ${isSent ? 'sent' : ''}">
        <div class="clue-label">${clue.label}</div>
        <div class="clue-preview">${clue.content}</div>
        ${isSent
          ? '<button class="btn btn-sent">✓ Skickat till David!</button>'
          : `<button class="btn btn-primary" onclick="doSendClue()">📤 Skicka till David</button>`}
      </div>` : '<div class="empty-clues">Inga ledtrådar för den här fasen.</div>'}
    <div class="waiting">${waitMsg[phase]||''}</div>`;
}
window.doSendClue = async function() {
  const clue = CLUES[gamePhase]?.[role];
  if (clue) await sendClueToFirebase(gamePhase, role, clue);
};

// --- Admin ---
function renderAdmin() {
  const phase   = gamePhase;
  const clueRows = Object.entries(sentClues)
    .map(([id,v]) => `<span style="margin-right:10px;font-family:monospace;font-size:12px;">${id}: ${v?'✓':'–'}</span>`)
    .join('') || '—';

  appEl.innerHTML = `
    <div class="header">🔧 Admin<span class="phase-badge">Fas ${phase==='victory'?'✓':`${phase}/3`}</span></div>
    <div class="card">
      <h2>Skickade ledtrådar</h2>
      <div style="line-height:2;">${clueRows}</div>
    </div>
    <div class="section-label">Hoppa till fas</div>
    <div class="admin-grid">
      <button class="admin-btn" onclick="adminSet(1)">→ Fas 1</button>
      <button class="admin-btn" onclick="adminSet(2)">→ Fas 2</button>
      <button class="admin-btn" onclick="adminSet(3)">→ Fas 3</button>
      <button class="admin-btn" onclick="adminSet('victory')">→ Victory</button>
    </div>
    <button class="btn btn-secondary" style="margin-top:12px;" onclick="adminReset()">🔄 Återställ spelet</button>`;
}
window.adminSet   = p => advancePhase(p);
window.adminReset = async () => { if (confirm('Återställ hela spelet?')) await resetGame(); };

// --- Victory ---
function renderVictory() {
  stopTimer();
  appEl.innerHTML = `
    <div class="victory">
      <div class="big">🎉</div>
      <h1>GRATTIS DAVID!</h1>
      <p>Ni löste alla mysterier, navigerade sjukhuskaos och räddade rätt bebis — precis innan Louise märkte något!</p>
      <p style="margin-top:20px;font-size:28px;">Välkommen till världen, liten! 👶</p>
      <p style="margin-top:36px;font-size:13px;color:var(--text-dim);">Operation: Fel Bebis — slutförd ✓</p>
    </div>`;
}

// ============================================================
// FIREBASE LISTENERS
// ============================================================
function setupListeners() {
  onValue(ref(db,'game/phase'), snap => {
    gamePhase    = snap.val() ?? 1;
    selectedRoom = null;
    selectedBaby = null;
    render();
  });
  onValue(ref(db,'game/davidClues'), snap => {
    davidClues = snap.val() ?? {};
    refreshDavidClues();
  });
  onValue(ref(db,'game/clues'), snap => {
    sentClues = snap.val() ?? {};
    if (role?.startsWith('team')) renderTeam(role);
    if (role === 'admin') renderAdmin();
  });
  onValue(ref(db,'game/phase3Start'), snap => {
    phase3Start = snap.val();
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  if (NEEDS_SETUP || !role || !['david','team1','team2','team3','admin'].includes(role)) {
    render(); return;
  }
  await ensureGame();
  setupListeners();
}

init().catch(err => {
  appEl.innerHTML = `<div class="loading"><p style="color:var(--red);">Fel: ${err.message}</p></div>`;
});
</script>
</body>
</html>
