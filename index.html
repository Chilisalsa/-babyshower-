  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #1a1a2e;
      --surface2: #252540;
      --accent: #ff9f43;
      --green: #00c896;
      --red: #e84393;
      --blue: #74b9ff;
      --purple: #a29bfe;
      --text: #e8e8f0;
      --text-dim: #7f8c8d;
      --border: #2c2c4a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 16px 48px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 16px;
      color: var(--text-dim);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .header {
      display: flex;
      align-items: center;
      padding: 12px 0 20px;
      font-weight: 700;
      font-size: 17px;
    }
    .phase-badge {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 16px 0 8px;
    }
    .sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* Lucktext */
    .lucktext {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px;
      line-height: 2.2;
      margin-bottom: 12px;
    }
    .blank {
      display: inline-block;
      min-width: 40px;
      padding: 2px 8px;
      border-radius: 4px;
      margin: 0 2px;
      font-weight: bold;
      transition: all 0.3s ease;
      border-bottom: 2px dashed var(--text-dim);
      color: var(--text-dim);
    }
    .blank.filled {
      color: var(--green);
      border-bottom: 2px solid var(--green);
      background: rgba(0,200,150,0.1);
    }

    /* Dossier */
    .dossier-card {
      background: #12121f;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      max-height: 320px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-line;
      font-family: 'SF Mono', 'Cascadia Code', 'Menlo', monospace;
    }
    .dossier-line { padding: 1px 0; }
    .dossier-line.highlight {
      background: rgba(255,159,67,0.1);
      border-left: 3px solid var(--accent);
      padding-left: 8px;
      margin: 2px 0;
    }

    /* Inputs */
    .puzzle-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px; color: var(--text);
      font-size: 16px; margin-bottom: 12px;
    }
    .puzzle-input:focus { outline: none; border-color: var(--accent); }
    .puzzle-label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; line-height: 1.6; white-space: pre-line; }

    /* Buttons */
    .btn {
      display: block; width: 100%;
      padding: 14px; border: none;
      border-radius: var(--radius);
      font-size: 16px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-primary:active { transform: scale(0.98); filter: brightness(0.9); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sent      { background: var(--surface); color: var(--green); border: 1px solid var(--green); cursor: default; }

    /* Feedback */
    .feedback {
      border-radius: 8px; padding: 12px;
      margin-top: 8px; font-size: 14px;
      text-align: center; display: none;
    }
    .feedback.success { display: block; background: rgba(0,200,150,0.12); border: 1px solid var(--green); color: var(--green); }
    .feedback.error   { display: block; background: rgba(232,67,147,0.12); border: 1px solid var(--red);   color: var(--red); }

    /* Timer */
    .timer {
      text-align: center;
      font-size: 52px; font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      padding: 8px; margin-bottom: 8px;
    }
    .timer.ok      { color: var(--green); }
    .timer.warning { color: var(--accent); }
    .timer.urgent  { color: var(--red); animation: pulse 0.6s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Role select */
    .role-grid { display: grid; gap: 12px; padding-top: 8px; }
    .role-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .role-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .role-emoji { font-size: 28px; }
    .role-name  { font-size: 17px; font-weight: 700; margin: 6px 0 3px; }
    .role-desc  { font-size: 13px; color: var(--text-dim); }

    /* Victory */
    .victory { text-align: center; padding: 48px 16px; }
    .victory .big { font-size: 64px; margin-bottom: 16px; }
    .victory h1 { font-size: 28px; color: var(--accent); margin-bottom: 12px; }
    .victory p  { font-size: 15px; line-height: 1.7; color: var(--text-dim); }

    .alert-banner {
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; font-size: 14px;
    }
    .alert-red { background: rgba(232,67,147,0.1); border: 1px solid var(--red); }

    .progress { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; text-align: center; }

    .waiting { text-align: center; color: var(--text-dim); font-size: 14px; padding: 16px; }
  </style>
</head>

const role = new URLSearchParams(location.search).get('role');

let answers        = {};
let phase3Start    = null;
let phaseStart     = null;
let timerInterval  = null;
let teamAnswers    = {};

// ============================================================
// FIREBASE HELPERS
// ============================================================
async function ensureGame() {
  const snap = await get(ref(db, 'game/phase'));
  if (!snap.exists()) await set(ref(db, 'game'), { phase: 1 });
}

async function submitAnswerToFirebase(blankKey, answer, phase, teamRole) {
  const data = {};
  data[`game/answers/${blankKey}`] = answer;
  data[`game/teamAnswers/${teamRole}/${blankKey}`] = true;
  await update(ref(db), data);
}

async function advancePhase(next) {
  const updates = { 'game/phase': next, 'game/phaseStart': Date.now() };
  if (next === 3) updates['game/phase3Start'] = Date.now();
  if (next === 1) updates['game/answers'] = {};
  if (next === 1) updates['game/teamAnswers'] = {};
  if (next === 1) updates['game/messages'] = {};
  await update(ref(db), updates);
}

async function sendMessageToDavid(teamRole, text) {
  const msgRef = push(ref(db, 'game/messages'));
  await set(msgRef, { team: teamRole, text: text.trim(), timestamp: Date.now() });
  for (const key of PHASES[gamePhase]?.dossiers?.[teamRole]?.answerFields || []) {
    const blank = PHASES[gamePhase]?.blanks?.[key];
    if (blank && matchAnswer(text, blank.answers)) {
      await submitAnswerToFirebase(key, text, gamePhase, teamRole);
    }
  }
}

async function resetGame() {
  await set(ref(db, 'game'), { phase: 1 });
}

// ============================================================
// HELPERS
// ============================================================
function matchAnswer(typed, accepted) {
  const lower = typed.trim().toLowerCase();
  return accepted.some(a => lower.includes(a.toLowerCase()) || a.toLowerCase().includes(lower));
}

function isBlankFilled(key) { return !!answers[key]; }
function countFilled(phase) {
  return Object.keys(PHASES[phase]?.blanks || {}).filter(k => answers[k]).length;
}
function totalBlanks(phase) {
  return Object.keys(PHASES[phase]?.blanks || {}).length;
}

  if (NEEDS_SETUP)                                                       { renderSetup();      return; }

    if (!window._adminAuthed) { renderAdminAuth(); return; }
    renderAdmin(); return;
  }
  if (gamePhase === 'victory')                                            { renderVictory();    return; }
  if (role === 'david')  { renderDavid(); return; }
  renderTeam(role);
}

// --- David ---
function renderDavid() {
  const phase = gamePhase;
  const data  = PHASES[phase];
  if (!data) return;

  const filled = countFilled(phase);
  const total  = totalBlanks(phase);

  const storyHtml = data.story.replace(
    /<b class="blank" data-key="([^"]+)">([^<]+)<\/b>/g,
    (match, key, label) => {
      if (answers[key]) {
        return `<span class="blank filled">${answers[key]}</span>`;
      }
      return match;
    }
  );

  let teamHints = '';
  const elapsedSecs = phaseStart ? Math.floor((Date.now() - phaseStart) / 1000) : 0;
  const showHints = elapsedSecs >= 5 * 60;
  if (showHints && data.whoHasWhat) {
    const remaining = Object.entries(data.whoHasWhat).filter(([t]) => {
      const fields = data.dossiers[t]?.answerFields || [];
      return fields.some(f => !answers[f]);
    });
    if (remaining.length > 0) {
      teamHints = '<div class="card" style="background:var(--surface2);border:1px solid var(--accent);"><h2>💡 Hint — Vem har vilken dossier?</h2><div style="font-size:13px;line-height:2;">' +
        remaining.map(([t, desc]) => {
          const info = TEAM_INFO[t];
          const fields = data.dossiers[t]?.answerFields || [];
          const unfilled = fields.filter(f => !answers[f]);
          const stillNeeded = unfilled.map(f => `<span style="color:var(--accent);">[${data.blanks[f]?.label}]</span>`).join(', ');
          return `${info.emoji} <strong>${info.name}</strong> — ${desc} ${stillNeeded ? `<br><span style="font-size:11px;color:var(--text-dim);padding-left:24px;">Du behöver: ${stillNeeded}</span>` : ''}`;
        }).join('<br>') +
        '</div></div>';
    }
  } else if (!showHints && data.whoHasWhat && filled < total) {
    const minsLeft = Math.max(0, 5 - Math.floor(elapsedSecs / 60));
    teamHints = `<div class="card" style="background:var(--surface2);opacity:0.5;text-align:center;"><p style="font-size:13px;color:var(--text-dim);">💡 Hints låses upp om <strong>${minsLeft} min</strong></p></div>`;
  }

  appEl.innerHTML = `
    <div class="header">🎯 David<span class="phase-badge">Fas ${phase}/3 — ${data.title}</span></div>
    ${phase === 3 ? '<div id="timer-box"></div>' : ''}
    <div class="progress">🔍 ${filled}/${total} luckor ifyllda</div>
    <div class="lucktext">${storyHtml}</div>
    ${teamHints}
    <div class="card">
      <h2>📬 Meddelanden från lagen</h2>
      <div id="david-messages" style="max-height:300px;overflow-y:auto;"></div>
    </div>
    <div class="card">
      <h2>📖 Din uppgift</h2>
      <p style="font-size:14px;line-height:1.7;color:var(--text-dim);">
        ${phase === 1 ? 'Lagen har varsin dossier med information. <strong>DU måste berätta för dem vad du behöver veta.</strong> Luckorna ovan visar vad som saknas. Fråga rätt lag!' : ''}
        ${phase === 2 ? 'Lagen granskar personallistor, kartor och rumsloggar. <strong>Berätta för dem exakt vilken information du behöver</strong> för att fylla luckorna.' : ''}
        ${phase === 3 ? '⏱️ <strong>7 minuter!</strong> Berätta för lagen vilken information du behöver om bebisarna — de måste leta i sina dossiers.' : ''}
      </p>
    </div>
    ${filled === total
      ? `<button class="btn btn-primary" onclick="davidAdvance()">✅ Alla luckor ifyllda — ${phase < 3 ? 'Fortsätt till fas '+(phase+1) : 'Slutför uppdraget!'}</button>`
      : '<div class="waiting">Väntar på att lagen skickar sina svar… ⏳</div>'}`;

  refreshDavidMessages();
  if (phase === 3) startTimer();
}
window.davidAdvance = function() {
  const phase = gamePhase;
  if (phase < 3) advancePhase(phase + 1);
  else advancePhase('victory');
};
function refreshDavidMessages() {
  const el = document.getElementById('david-messages');
  if (!el) return;
  const msgs = Object.values(messages)
    .filter(m => m.team)
    .sort((a, b) => a.timestamp - b.timestamp)
    .slice(-20);
  if (msgs.length === 0) {
    el.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:12px;font-size:13px;">Väntar på att lagen ska skicka information… 💬</div>';
  } else {
    el.innerHTML = msgs.map(m => {
      const info = TEAM_INFO[m.team];
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5;">
        <span style="color:${info?.color || 'var(--text)'};font-weight:600;">${info?.emoji || ''} ${info?.name || m.team}</span>
        <span style="color:var(--text-dim);font-size:10px;float:right;">${new Date(m.timestamp).toLocaleTimeString('sv',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
        <br><span style="color:var(--text);">"${m.text}"</span>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  }
}

// --- Team ---
function renderTeam(teamRole) {
  const phase = gamePhase;
  const data  = PHASES[phase];
  const info  = TEAM_INFO[teamRole];
  const doss  = data?.dossiers?.[teamRole];
  if (!data || !doss) {
    appEl.innerHTML = `
      <div class="header">${info.emoji} ${info.name}<span class="phase-badge">Fas ${phase}/3</span></div>
      <div class="waiting">Väntar…</div>`;
    return;
  }

  const hasAnswered = doss.answerFields.every(f => teamAnswers[teamRole]?.[f]);

  const dossierHtml = doss.lines.map(([text, hl], idx) =>
    text === ''
      ? '<div style="height:8px;"></div>'
      : `<div class="dossier-line ${hl ? 'highlight' : ''}" onclick="tapLine('${teamRole}',${idx})" style="cursor:pointer;transition:background 0.15s;">${text}</div>`
  ).join('');

  appEl.innerHTML = `
    <div class="header">${info.emoji} ${info.name}<span class="phase-badge">Fas ${phase}/3 — ${data.title}</span></div>
    ${phase === 3 ? '<div class="alert-banner alert-red">⚠️ 7 minuters timer aktiv! Hjälp David hitta Samuel NU!</div>' : ''}
    <div class="section-label">📂 Er dossier <span style="font-weight:400;color:var(--text-dim);font-size:11px;">— tryck på en rad för att skicka till David</span></div>
    <div class="dossier-card" id="dossier-scroll">${dossierHtml}</div>
    ${hasAnswered
      ? `<div class="btn btn-sent" style="margin-bottom:12px;">✅ Svar skickat till David!</div>`
      : `
        <div class="card">
          <div class="puzzle-label">David väntar på information från er.<br><br>Läs er dossier noggrant. <strong>David kommer berätta vad han behöver.</strong><br><br>Skriv ett svar i taget:</div>
          <input class="puzzle-input" id="team-answer" placeholder="Skriv ert svar här…" autocomplete="off">
          <div class="feedback" id="team-fb"></div>
          <button class="btn btn-primary" onclick="teamSubmit('${teamRole}')">📤 Skicka till David</button>
        </div>`
    }
    <div class="waiting">${phase === 3 ? '⏱️ Varje sekund räknas!' : '💬 Prata med David och de andra lagen — kommunikation är nyckeln!'}</div>`;
}
window.tapLine = async function(teamRole, idx) {
  const data = PHASES[gamePhase];
  const doss = data?.dossiers?.[teamRole];
  const line = doss?.lines?.[idx];
  if (!line || !line[0]) return;
  const el = document.querySelector(`#dossier-scroll > :nth-child(${idx+1})`);
  if (el) { el.style.background = 'rgba(0,200,150,0.2)'; setTimeout(() => { el.style.background = ''; }, 600); }
  await sendMessageToDavid(teamRole, line[0]);
};
window.teamSubmit = async function(teamRole) {
  const phase = gamePhase;
  const data  = PHASES[phase];
  const doss  = data?.dossiers?.[teamRole];
  const fb    = document.getElementById('team-fb');
  const input = document.getElementById('team-answer');
  if (!doss) return;

  const raw = (input?.value || '').trim();
  if (!raw) { showFb(fb, 'error', 'Skriv ett svar först!'); return; }

  const fields = doss.answerFields;
  const blanks = data.blanks;
  let matched = false;

  for (const key of fields) {
    if (answers[key]) continue;
    const acc = blanks[key]?.answers || [];
    if (matchAnswer(raw, acc)) {
      await submitAnswerToFirebase(key, raw, phase, teamRole);
      const label = blanks[key]?.label || key;
      const filledNow = fields.filter(f => answers[f] || f === key).length;
      const total = fields.length;
      if (filledNow >= total) {
        showFb(fb, 'success', `✅ Alla svar skickade! (${filledNow}/${total})`);
        if (input) input.disabled = true;
      } else {
        showFb(fb, 'success', `✅ [${label}] skickat! ${filledNow}/${total} — nästa svar?`);
        if (input) input.value = '';
      }
      matched = true;
      break;
    }
  }

  if (!matched) {
    showFb(fb, 'error', '❌ Stämmer inte. Läs er dossier igen!');
  }
};

// --- Admin Auth ---
window._adminAuthed = false;
function renderAdminAuth() {
  appEl.innerHTML = `
    <div style="padding-top:48px;text-align:center;">
      <div style="font-size:40px;">🔒</div>
      <h1 style="font-size:22px;color:var(--accent);margin:16px 0 8px;">Admin-inloggning</h1>
      <p style="font-size:14px;color:var(--text-dim);margin-bottom:24px;">Ange lösenord för att fortsätta</p>
      <input class="puzzle-input" id="admin-pw" type="password" placeholder="Lösenord" autocomplete="off" style="max-width:280px;margin:0 auto 12px;display:block;">
      <div class="feedback" id="admin-fb"></div>
      <button class="btn btn-primary" onclick="adminLogin()" style="max-width:280px;margin:0 auto;">Logga in</button>
    </div>`;
  setTimeout(() => document.getElementById('admin-pw')?.focus(), 100);
}
window.adminLogin = function() {
  const pw = document.getElementById('admin-pw')?.value;
  const fb = document.getElementById('admin-fb');
  if (pw === 'apa') {
    window._adminAuthed = true;
    renderAdmin();
  } else {
    showFb(fb, 'error', 'Fel lösenord');
  }
};

// --- Admin ---
function renderAdmin() {
  const phase = gamePhase;
  const isVictory = phase === 'victory';
  const data       = isVictory ? PHASES[3] : PHASES[phase];
  const blankCount = data ? totalBlanks(isVictory ? 3 : phase) : 0;
  const filled     = data ? Object.keys(data.blanks).filter(k => answers[k]).length : 0;

  let statusRows = '';
  if (data) {
    const blankTeam = {};
    Object.entries(data.dossiers).forEach(([t, d]) => {
      d.answerFields.forEach(f => { blankTeam[f] = t; });
    });
    statusRows = Object.entries(data.blanks).map(([key, b]) => {
      const icon = answers[key] ? '🟢' : '🔲';
      const val  = answers[key] || '<span style="color:var(--text-dim);">—</span>';
      const facit = b.answers[0];
      const tKey = blankTeam[key];
      const team = TEAM_INFO[tKey];
      const source = team ? `<span style="font-size:10px;color:${team.color};white-space:nowrap;">${team.emoji} ${team.name}</span>` : '';
      return `<div style="line-height:2.2;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <span style="flex:1;">${icon} <strong>${b.label}</strong>: ${val}</span>
        <span style="font-size:10px;color:var(--accent);font-family:monospace;white-space:nowrap;">facit: ${facit}</span>
        ${source}
      </div>`;
    }).join('');
  }

  const baseUrl = location.origin + location.pathname;
  const qrLinks = [
    { label: '🏠 Huvudsida', url: baseUrl },
    { label: '🎯 David',    url: baseUrl + '?role=david' },
    { label: '🍼 Blöjpatrullen', url: baseUrl + '?role=team1' },
    { label: '🧸 Nappkommissionen', url: baseUrl + '?role=team2' },
    { label: '🥣 Vällingmaffian', url: baseUrl + '?role=team3' },
    { label: '🔧 Admin',    url: baseUrl + '?role=admin' },
  ];
  const qrHtml = qrLinks.map(q => `
    <div style="text-align:center;padding:8px;background:var(--surface);border-radius:8px;">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(q.url)}" 
           style="display:block;margin:0 auto;border-radius:4px;width:100px;height:100px;" alt="QR">
      <div style="font-size:12px;font-weight:600;margin:4px 0 0;">${q.label}</div>
      <div style="font-size:9px;color:var(--text-dim);word-break:break-all;line-height:1.2;" onclick="navigator.clipboard.writeText('${q.url}')">📋 Kopiera</div>
    </div>`).join('');

  appEl.innerHTML = `
    <div class="header">🔧 Admin<span class="phase-badge">${isVictory ? '✓ KLAR' : `Fas ${phase}/3`}</span></div>
    ${isVictory ? '<div class="alert-banner alert-red" style="margin-bottom:12px;">⚠️ Spelet är avslutat. Facit för fas 3 visas nedan. Återställ för att starta om.</div>' : ''}
    <div class="card">
      <h2>Luckor ifyllda: ${filled}/${blankCount} ${isVictory ? '(fas 3)' : ''}</h2>
      <div style="color:var(--text-dim);font-size:11px;margin-bottom:8px;">Facit i orange till höger</div>
      ${statusRows}
    </div>
    <div class="card">
      <h2>📱 QR-koder för alla roller</h2>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        ${qrHtml}
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:8px;text-align:center;">Tryck på "📋 Kopiera" för att kopiera URL</div>
    </div>
    <div class="section-label">Hoppa till fas</div>
    <button class="btn btn-secondary" onclick="adminSet(1)" style="margin-bottom:6px;">→ Fas 1: Kaoset hemma</button>
    <button class="btn btn-secondary" onclick="adminSet(2)" style="margin-bottom:6px;">→ Fas 2: Sjukhuslabyrinten</button>
    <button class="btn btn-secondary" onclick="adminSet(3)" style="margin-bottom:6px;">→ Fas 3: Rädda Samuel (7min timer)</button>
    <button class="btn btn-secondary" onclick="adminSet('victory')" style="margin-bottom:12px;">→ Victory</button>
    <button class="btn btn-primary" onclick="adminReset()" style="background:rgba(232,67,147,0.85);border-color:var(--red);color:#fff;margin-bottom:8px;">🔄 Återställ spelet — börja om från fas 1</button>
    <button class="btn btn-secondary" onclick="adminLogout()" style="font-size:13px;color:var(--text-dim);">🚪 Logga ut</button>`;
}
window.adminLogout = function() {
  window._adminAuthed = false;
  renderAdminAuth();
};
window.adminSet   = p => advancePhase(p);
window.adminReset = async () => { if (confirm('Återställ hela spelet?')) await resetGame(); };

// --- Victory ---
function renderVictory() {
  stopTimer();
  appEl.innerHTML = `
    <div class="victory">
      <div class="big">🎉</div>
      <h1>Välkommen till världen, Samuel!</h1>
      <p>Ni löste alla mysterier tillsammans — lagens detektivarbete och Davids beslutsamhet räddade dagen.</p>
      <p style="margin-top:24px;font-size:22px;color:var(--green);">Samuel von Martens 👶<br><span style="font-size:14px;color:var(--text-dim);">21 maj — 3,2 kg — 51 cm</span></p>
      <p style="margin-top:36px;font-size:13px;color:var(--text-dim);">Operation: Fel Bebis — slutförd ✓<br>Grattis David & Louise Riknert! 🎁</p>
    </div>`;
}

// --- Feedback ---
function showFb(el, type, msg) {
  if (!el) return;
  el.className = `feedback ${type}`;
  el.textContent = msg;
}

// ============================================================
// TIMER (endast fas 3)
// ============================================================
function startTimer() {
  stopTimer();
  tickTimer();
  timerInterval = setInterval(tickTimer, 1000);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
function tickTimer() {
  const box = document.getElementById('timer-box');
  if (!box || !phase3Start) return;
  const remaining = Math.max(0, PHASE3_SECS - Math.floor((Date.now() - phase3Start) / 1000));
  const m   = String(Math.floor(remaining/60)).padStart(2,'0');
  const s   = String(remaining%60).padStart(2,'0');
  const cls = remaining < 30 ? 'urgent' : remaining < 90 ? 'warning' : 'ok';
  box.innerHTML = `<div class="timer ${cls}">${m}:${s}</div>`;
}

// ============================================================
// FIREBASE LISTENERS
// ============================================================
function setupListeners() {
  onValue(ref(db,'game/phase'), snap => {
    gamePhase = snap.val() ?? 1;
    if (gamePhase !== 3) stopTimer();
    render();
  });
  onValue(ref(db,'game/answers'), snap => {
    answers = snap.val() ?? {};
    if (role === 'david') renderDavid();
    if (role === 'admin') renderAdmin();
  });
  onValue(ref(db,'game/teamAnswers'), snap => {
    teamAnswers = snap.val() ?? {};
    if (role?.startsWith('team')) renderTeam(role);
  });
  onValue(ref(db,'game/phase3Start'), snap => {
    phase3Start = snap.val();
    if (gamePhase === 3 && role === 'david') startTimer();
  });
  onValue(ref(db,'game/phaseStart'), snap => {
    phaseStart = snap.val();
  });
  onValue(ref(db,'game/messages'), snap => {
    messages = snap.val() ?? {};
    if (role === 'david') refreshDavidMessages();
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  if (NEEDS_SETUP || !role || !['david','team1','team2','team3','admin'].includes(role)) {
    render(); return;
  }
  await ensureGame();
  setupListeners();
}

init().catch(err => {
  appEl.innerHTML = `<div class="loading"><p style="color:var(--red);">Fel: ${err.message}</p></div>`;
});
</script>
